name: Deploy Production
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy files
        run: |
          mkdir -p deploy
          cp index.html sw.js manifest.json dashboard.html deploy/
          cp catalogue.json panels.json preanalytical.json doctors.json deploy/
          cp icon-192.png icon-512.png deploy/
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
